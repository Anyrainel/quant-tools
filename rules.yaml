rules:
  - id: R-001
    name: "Late cycle gold floor"
    condition:
      cycle_stage: [late, crisis]
      gold_pct_portfolio: [0, 12]
    action: "Increase gold allocation to 12-15% of investable assets"
    vault: "dalio/08-asset-returns-and-positioning/gold-real-assets-in-devaluation"
    confidence: high

  - id: R-002
    name: "VIX spike buy opportunity"
    condition:
      vix: [35, 999]
      cash_pct: [8, 100]
    action: "Deploy 30-50% of cash into broad equity (VOO/VTI)"
    vault: "dalio/09-investing-principles/market-top-and-bottom-signals"
    confidence: medium

  - id: R-003
    name: "Acute stress + rising inflation"
    condition:
      stress_direction: [acute]
      inflation_regime: [rising, acute]
    action: "Shift to hard assets: gold, commodities, real assets. Minimize nominal bonds and cash."
    vault: "dalio/02-deleveraging-playbook/deflationary-vs-inflationary-types"
    confidence: high

  - id: R-004
    name: "r > g sustained"
    condition:
      r_minus_g: [0.5, 999]
      cycle_stage: [late, crisis]
    action: "Sovereign stress entering dangerous territory. Reduce duration. Consider puts on long bonds."
    vault: "dalio/05-sovereign-debt-stress"
    confidence: high

  - id: R-005
    name: "Acute stress + disinflation"
    condition:
      stress_direction: [acute]
      inflation_regime: [disinflation]
    action: "Deflationary deleveraging path. Add duration (intermediate bonds). Gold still works but bonds outperform."
    vault: "dalio/02-deleveraging-playbook/deflationary-vs-inflationary-types"
    confidence: medium

  - id: R-006
    name: "Military conflict active"
    condition:
      brent: [110, 999]
      gold_yoy: [15, 999]
    action: "Geopolitical risk elevated. Hold/add gold, energy, defense. Do NOT sell hedges into strength."
    vault: "dalio/06-geopolitical-cycles/economic-war-precedes-hot-war"
    confidence: medium

  - id: R-007
    name: "Bubble valuation signal"
    condition:
      cycle_stage: [mid, late]
      vix: [0, 15]
      credit_spread: [0, 150]
    action: "Late-cycle complacency. Reduce equity concentration. Build put protection."
    vault: "dalio/01-debt-cycle-mechanics/bubble-formation-signals"
    confidence: medium

  - id: R-008
    name: "Dollar debasement risk"
    condition:
      cycle_stage: [late, crisis]
      m2_yoy: [6, 999]
      r_minus_g: [-1, 999]
    action: "Currency debasement risk elevated. Increase hard asset exposure: gold, commodities, foreign equities. Reduce USD cash."
    vault: "dalio/03-currency-monetary-systems"
    confidence: high

  - id: R-009
    name: "Yield curve inversion — recession signal"
    condition:
      yield_curve: [-999, -0.5]
      cycle_stage: [mid, late]
    action: "Inverted yield curve signals upcoming recession. Begin rotating out of cyclicals into defensives and short-duration assets."
    vault: "dalio/01-debt-cycle-mechanics/short-term-debt-cycle"
    confidence: medium

  - id: R-010
    name: "Crisis + deflation — all-weather"
    condition:
      stress_direction: [acute]
      inflation_regime: [disinflation]
      cycle_stage: [crisis]
    action: "Full deflationary crisis. Maximize duration bonds + gold. Avoid equities until credit spreads peak and reverse."
    vault: "dalio/02-deleveraging-playbook/deflationary-vs-inflationary-types"
    confidence: high

  - id: R-011
    name: "Fed balance sheet expansion — monetary stimulus"
    condition:
      fed_bs_gdp: [30, 999]
      stress_direction: [deteriorating, acute]
    action: "Fed monetizing debt. Nominal assets will outperform real assets temporarily, then reverse. Gold leads. Add gold, reduce cash."
    vault: "dalio/03-currency-monetary-systems"
    confidence: medium

  - id: R-012
    name: "Geopolitical tension — diversify geography"
    condition:
      gold_oil_ratio: [25, 999]
      gold_yoy: [10, 999]
    action: "Gold/oil ratio and gold surge signal geopolitical fear premium. Maintain international diversification. Avoid single-country concentration."
    vault: "dalio/06-geopolitical-cycles/economic-war-precedes-hot-war"
    confidence: medium

  - id: R-013
    name: "Credit stress broadening"
    condition:
      credit_spread: [300, 999]
      yield_curve: [-999, 0]
    action: "Credit stress + inversion = late cycle credit crunch forming. Reduce high-yield exposure. Prefer investment grade or cash."
    vault: "dalio/01-debt-cycle-mechanics/bubble-formation-signals"
    confidence: high

  - id: R-014
    name: "Breakeven surge — inflation expectations unanchored"
    condition:
      breakeven_5y: [3.0, 999]
      core_pce_yoy: [3.5, 999]
    action: "Inflation expectations becoming unanchored. TIPS outperform nominals. Add commodity exposure. Central bank credibility at risk."
    vault: "dalio/03-currency-monetary-systems"
    confidence: high
